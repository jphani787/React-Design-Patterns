enum JobType {
  FULL_TIME
  PART_TIME
  CONTRACT
  TEMPORARY
  VOLUNTEER
  INTERNSHIP
}

type Job {
  id: ID!
  title: String!
  company: Company!
  location: String!
  description: String!
  type: JobType!
  remote: Boolean!
  salary: Int!
  createdAt: DateTime!
  updatedAt: DateTime!
  isApplied: Boolean!
}

type SearchJobsInput {
  query: String!
}

type Query {
  searchJobs(input: SearchJobsInput!): [Job!]!
}

type CreateJobInput {
  title: String!
  location: String!
  description: String!
  type: JobType!
  remote: Boolean!
  salary: Int!
  companyName: String!
}

type DeleteJobInput {
  id: ID!
}

type ApplyToJobInput {
  id: ID!
}

type CancelApplicationInput {
  id: ID!
}

type Mutation {
  createJob(input: CreateJobInput!): Job!
  deleteJob(input: DeleteJobInput!): Boolean!
  applyToJob(input: ApplyToJobInput!): Boolean!
  cancelApplication(input: CancelApplicationInput!): Boolean!
}
